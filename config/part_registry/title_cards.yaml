# Layer 2 (= compositional parts) の title_card (= screenplay 全体の冒頭/末尾に
# 被せる全画面カード)。
# 詳細は docs/plannings/2026-05-10_compositional-architecture.md §4.1
#
# 各 entry は global_parts.intro_card / global_parts.outro_card の id として
# screenplay から参照される (= screenplay-wide)。
# ScreenplayBase が plan.video.duration_frames から intro/outro の Sequence 配置
# (= 冒頭 / 末尾の duration_sec frame) を計算する。
#
# screenplay 例:
#   "global_parts": {
#     "intro_card": {
#       "id": "simple_intro",
#       "duration_sec": 1.5,
#       "params": { "text": "知らないと損する3つのコツ" }
#     },
#     "outro_card": {
#       "id": "subscribe_outro",
#       "duration_sec": 2.0,
#       "params": { "text": "チャンネル登録お願いします", "sub_text": "↓ 押すだけ" }
#     }
#   }

version: 1
parts:
  - id: simple_intro
    description: |
      汎用 intro。黒背景 + 白文字、spring fade-in / 末尾 fade-out。
      汎用 outro としても使える。
    params_schema:
      text: { type: string, required: true }
      sub_text: { type: string }
      enter_frames: { type: number, default: 14 }
      exit_frames: { type: number, default: 10 }
    valid_contexts: [global]
    component: SimpleIntro
    deprecated: false

  - id: subscribe_outro
    description: |
      赤背景の YouTube 風チャンネル登録誘導。outro 専用想定。
      文言は params.text / sub_text で外から渡す (= 動画ごとに変えられる)。
    params_schema:
      text: { type: string, required: true, description: "メイン CTA 文言" }
      sub_text: { type: string }
      enter_frames: { type: number, default: 14 }
      exit_frames: { type: number, default: 10 }
    valid_contexts: [global]
    component: SubscribeOutro
    deprecated: false

  - id: section_break
    description: |
      シンプルな仕切り。"Part 2" 等。青系ライン上下で区切る。
      intro / outro どちらにも使える (= 短い時間で挟む想定)。
    params_schema:
      text: { type: string, required: true }
      sub_text: { type: string }
      enter_frames: { type: number, default: 12 }
      exit_frames: { type: number, default: 8 }
    valid_contexts: [global]
    component: SectionBreak
    deprecated: false
