# Layer 2 (= compositional parts) の sticker (= 絵文字オーバーレイ) SSOT。
# 詳細は docs/plannings/2026-05-10_compositional-architecture.md §4.1
#
# 各 entry は scene_parts.stickers[].id として screenplay から参照される。
# 実装はすべて parts/stickers/EmojiSticker.tsx の薄いラッパ (= emoji 文字 + wobble 振幅 のみ差)。
# component フィールドは frontend/remotion/parts/stickers/index.ts の export 名と一致させる。
#
# screenplay 例:
#   "scene_parts": {
#     "stickers": [
#       { "id": "exclaim_red", "at": 0.5, "duration": 1.5,
#         "params": { "top": 0.3, "right": 0.1, "size": 240 } }
#     ]
#   }

version: 1
parts:
  - id: exclaim_red
    description: |
      ❗ 強調用。spring pop-in (= scale 0 → 1)、軽い wobble (= ±3°) で目を引く。
    params_schema:
      top: { type: number, description: "0-1 比率の上端から位置 (任意)" }
      left: { type: number, description: "0-1 比率の左端から位置 (任意)" }
      right: { type: number, description: "0-1 比率の右端から位置 (任意)" }
      bottom: { type: number, description: "0-1 比率の下端から位置 (任意)" }
      size: { type: number, default: 220, description: "px、1080×1920 想定" }
      pop_in_frames: { type: number, default: 12 }
      wobble_deg: { type: number, default: 3 }
    valid_contexts: [scene]
    component: ExclaimRed
    deprecated: false

  - id: question_mark
    description: |
      ❓ 疑問・問いかけ用。pop-in + 軽い wobble (= ±2°)。
    params_schema:
      top: { type: number }
      left: { type: number }
      right: { type: number }
      bottom: { type: number }
      size: { type: number, default: 220 }
      pop_in_frames: { type: number, default: 12 }
      wobble_deg: { type: number, default: 2 }
    valid_contexts: [scene]
    component: QuestionMark
    deprecated: false

  - id: sparkle
    description: |
      ✨ 喜び・気づき用。pop-in + 微 wobble (= ±1°)。
    params_schema:
      top: { type: number }
      left: { type: number }
      right: { type: number }
      bottom: { type: number }
      size: { type: number, default: 200 }
      pop_in_frames: { type: number, default: 14 }
      wobble_deg: { type: number, default: 1 }
    valid_contexts: [scene]
    component: Sparkle
    deprecated: false

  - id: thumbs_up
    description: |
      👍 同意・OK 用。pop-in + 軽い wobble (= ±2°)。
    params_schema:
      top: { type: number }
      left: { type: number }
      right: { type: number }
      bottom: { type: number }
      size: { type: number, default: 220 }
      pop_in_frames: { type: number, default: 12 }
      wobble_deg: { type: number, default: 2 }
    valid_contexts: [scene]
    component: ThumbsUp
    deprecated: false

  - id: fire
    description: |
      🔥 強調・盛り上がり用。pop-in + 軽い wobble (= ±2°)。
    params_schema:
      top: { type: number }
      left: { type: number }
      right: { type: number }
      bottom: { type: number }
      size: { type: number, default: 220 }
      pop_in_frames: { type: number, default: 12 }
      wobble_deg: { type: number, default: 2 }
    valid_contexts: [scene]
    component: Fire
    deprecated: false
