# Layer 2 (= compositional parts) の frame_layout (= scene 動画の framing 戦略)。
# 詳細は docs/plannings/2026-05-10_compositional-architecture.md §4.1
#
# 各 entry は scene_parts.frame_layout.id として screenplay から参照される (= scene 単位)。
# 元動画 (1080x1920 縦) を別レイアウトで配置する wrapper。
#
# 制約: 現状は **single-video framing** のみ (= 元動画の見せ方を変える)。
# split_horizontal / pip_corner などの **multi-video composition** は scene schema に
# secondary video 入力が必要なため future work とする。
#
# screenplay 例:
#   "scene_parts": {
#     "frame_layout": {
#       "id": "letterbox_top_bottom",
#       "params": { "video_height_ratio": 0.7 }
#     }
#   }

version: 1
parts:
  - id: full
    description: |
      identity (= 元動画を全画面に配置、既存挙動)。明示的に「frame_layout なし」
      と書きたいときの用 + default。
    params_schema: {}
    valid_contexts: [scene]
    component: FullFrame
    deprecated: false

  - id: letterbox_top_bottom
    description: |
      上下に黒帯を入れて動画を中央 70% に縮小。字幕領域確保 / cinematic 演出 /
      動画の上下を切りたい時に。
    params_schema:
      video_height_ratio:
        type: number
        default: 0.7
        description: 動画の縦サイズ比率 (= 0-1、0.7 で上下 15% ずつ黒帯)
      bar_color:
        type: string
        default: "#000000"
    valid_contexts: [scene]
    component: LetterboxTopBottom
    deprecated: false

  - id: centered_with_blur
    description: |
      中央 70% に縮小した動画 + 背景は同じ動画の blur 拡大版。
      縦動画を 16:9 などに転用する際の「背景埋め」と同じ手法。
      注意: 同じ video element を 2 回 render するため CPU 負荷が増える。
    params_schema:
      video_height_ratio:
        type: number
        default: 0.7
      blur_amount:
        type: number
        default: 40
        description: 背景の blur 強度 (px)
      blur_opacity:
        type: number
        default: 0.6
        description: 背景の不透明度 (= 0-1)
    valid_contexts: [scene]
    component: CenteredWithBlur
    deprecated: false
