# Layer 2 (= compositional parts) の camera_move (= scene 動画への post-effect 動き)。
# 詳細は docs/plannings/2026-05-10_compositional-architecture.md §4.1
#
# 各 entry は scene_parts.camera_move.id として screenplay から参照される (= scene 単位)。
# 実装は parts/camera_moves/CameraMove.tsx の wrapper 群で、frame に応じて
# CSS transform (= scale / translate) を補間する。
#
# 不変条件: 元動画ファイル (scene_<S>.mp4) は変更せず、Remotion render 時に
# transform 付きで再描画するだけ。AI 課金は発生しない。
#
# screenplay 例:
#   "scene_parts": {
#     "camera_move": { "id": "subtle_zoom_in", "params": { "to_scale": 1.07 } }
#   }

version: 1
parts:
  - id: none
    description: |
      identity wrapper (= 何もしない)。明示的に「camera move 無し」と書きたいとき用。
    params_schema: {}
    valid_contexts: [scene]
    component: NoneCameraMove
    deprecated: false

  - id: subtle_zoom_in
    description: |
      scene 全長で scale 1.00 → 1.05 にゆっくり寄る。talking head の単調さを軽減。
    params_schema:
      from_scale: { type: number, default: 1.0 }
      to_scale: { type: number, default: 1.05 }
    valid_contexts: [scene]
    component: SubtleZoomIn
    deprecated: false

  - id: ken_burns
    description: |
      scale + 横方向 pan の組合せ (= ドキュメンタリー風)。scale 1.05 → 1.12、
      右に 4% / 上に 2% ドリフト。
    params_schema:
      from_scale: { type: number, default: 1.05 }
      to_scale: { type: number, default: 1.12 }
      pan_from_x: { type: number, default: 0 }
      pan_to_x: { type: number, default: 0.04 }
      pan_from_y: { type: number, default: 0 }
      pan_to_y: { type: number, default: -0.02 }
    valid_contexts: [scene]
    component: KenBurns
    deprecated: false

  - id: dolly_pull_back
    description: |
      引き (= scale 1.10 → 1.00)。「全体が見えてくる」演出。intro / 結び に使う。
    params_schema:
      from_scale: { type: number, default: 1.1 }
      to_scale: { type: number, default: 1.0 }
    valid_contexts: [scene]
    component: DollyPullBack
    deprecated: false
