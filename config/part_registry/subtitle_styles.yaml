# Layer 2 (= compositional parts) の subtitle スタイル SSOT。
# 詳細は docs/plannings/2026-05-10_compositional-architecture.md §4.1
#
# 各 entry は scene_parts.subtitle_style.id として screenplay から参照される。
# component フィールドは frontend/remotion/parts/subtitles/index.ts の export 名と一致させる。

version: 1
parts:
  - id: minimal
    description: |
      白文字 + 黒縁取り。現状の ffmpeg drawtext と同等の見た目。default。
      アニメーションなし、可読性最優先。
    params_schema:
      font_size:
        type: number
        default: 76
        description: フォントサイズ (px)
      font_color:
        type: string
        default: "#FFFFFF"
      border_color:
        type: string
        default: "#000000"
      border_width:
        type: number
        default: 6
    valid_contexts: [scene]
    component: MinimalSubtitle
    deprecated: false

  - id: fade_in
    description: |
      表示開始から短時間 (= 既定 8 frame、約 0.13 秒) で opacity 0 → 1 へ
      フェードイン。視認性は minimal と同じ、現れ方が柔らかい。
    params_schema:
      font_size:
        type: number
        default: 76
      font_color:
        type: string
        default: "#FFFFFF"
      border_color:
        type: string
        default: "#000000"
      border_width:
        type: number
        default: 6
      fade_duration_frames:
        type: number
        default: 8
        description: フェードインに使う frame 数。0 で fade なし
    valid_contexts: [scene]
    component: FadeInSubtitle
    deprecated: false

  - id: karaoke_bold
    description: |
      TikTok 系の太字字幕 (= 96px、weight 900)。表示開始時に scale 1.12 → 1.0 を
      spring で settle する punch アニメーション。`emotion` (= line.emotion) に
      応じてハイライト色が変わる (例: 驚き=黄、怒り=赤、喜び=緑)。
      Word-level karaoke (= 単語ごとハイライト) は Stage 2 から alignment を取る
      Phase 5 以降で実装する。
    params_schema:
      font_size:
        type: number
        default: 96
      base_color:
        type: string
        default: "#FFFFFF"
      border_color:
        type: string
        default: "#000000"
      border_width:
        type: number
        default: 8
    valid_contexts: [scene]
    component: KaraokeBoldSubtitle
    deprecated: false
